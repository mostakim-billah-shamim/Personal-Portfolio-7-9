{% extends 'base/base.html' %}

{% block title %}
Contact List
{% endblock title %}


{% block body %}

<h4 class="text-center mt-5">Contact List</h4>

    <div class="row justify-content-center p-2 m-3">


        {% for data in data %}
        <div class="col-3 p-2 m-2 text-center card bg-light">



            <div class="card-body">
                <h5 class="card-title text-info">{{data.name}}</h5>
                <p class="card-text">{{data.email}}</p>
                <p class="card-text">{{data.phone}}</p>
                <p class="card-text">{{data.message}}</p>
                <p class="card-text">{{data.time}}</p>
            </div>
        </div>
        {% endfor %}
    </div>




{% endblock body %}
